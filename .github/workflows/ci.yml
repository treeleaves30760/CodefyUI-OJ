name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a newer push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv does not maintain a v8 alias; pin to the latest minor.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run pytest
        run: uv run pytest -v --tb=short

  frontend-checks:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc -b

      - name: Build
        run: pnpm build

      # Lint is non-blocking for now; the codebase has outstanding
      # react-hooks rule violations the team plans to clean up.
      - name: Lint
        run: pnpm lint
        continue-on-error: true

  docker-build:
    name: Docker compose build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate compose file
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build
        env:
          # Reuse the BuildKit instance set up by setup-buildx-action
          # so layers from previous steps are cached across the run.
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
